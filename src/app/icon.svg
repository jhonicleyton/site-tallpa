<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070B18"/>
      <stop offset="100%" stop-color="#0B1020"/>
    </linearGradient>
    <radialGradient id="glowBg" cx="50%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#103A8C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gradTallpa" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4AF8FF"/>
      <stop offset="45%" stop-color="#1BD8FF"/>
      <stop offset="100%" stop-color="#1840FF"/>
