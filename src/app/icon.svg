  <rect x="96" y="96" width="832" height="832" rx="168" fill="url(#bgGrad)"/>
  <rect x="96" y="96" width="832" height="832" rx="168" fill="url(#glowBg)"/>
  <g filter="url(#iconGlow)" transform="translate(192 144) scale(1.75)">
